# evil-read-arxiv 配置文件示例
# 复制此文件为 config.yaml 并修改为你自己的路径

# 语言设置 (zh/en)
# - "zh": 中文报告 (default)
# - "en": English reports
language: "zh"

# Obsidian Vault 路径（必填）
vault_path: "/home/pengjiawei/Documents/obsidian_storage"

# Papers 目录相对于 vault 的路径（可选，默认为 20_Research/Papers）
papers_dir: "20_Research/Papers"

# Semantic Scholar API Key（可选，配置后可减少 429 限流）
# 免费申请: https://www.semanticscholar.org/product/api#api-key
# semantic_scholar_api_key: "your-api-key-here"

# 研究兴趣配置（必填）
research_domains:
  # 研究领域名称可以自定义
  "大模型":
    # 关键词列表，用于搜索和匹配论文
    keywords:
      - "pre-training"
      - "foundation model"
      - "model architecture"
      - "large language model"
      - "LLM"
      - "transformer"
    # arXiv 分类（可选）
    arxiv_categories:
      - "cs.AI"
      - "cs.LG"
      - "cs.CL"
    # 优先级（可选，1-10，数值越高越优先）
    priority: 5

  # "多模态技术":
  #   keywords:
  #     - "vision-language"
  #     - "multimodal"
  #     - "image-text"
  #     - "visual"
  #     - "cross-modal"
  #   arxiv_categories:
  #     - "cs.CV"
  #     - "cs.MM"
  #     - "cs.CL"
  #   priority: 4

  "智能体":
    keywords:
      - "agent"
      - "multi-agent"
      - "orchestration"
      - "autonomous"
      - "planning"
    arxiv_categories:
      - "cs.AI"
      - "cs.MA"
      - "cs.RO"
    priority: 5

  "AI_Agent_&_Coding":
    keywords:
      # AI Coding 相关
      - "AI coding"
      - "code generation"
      - "automated software engineering"
      - "repository-level"
      - "SWE-bench"  # 关键评测集，研究 AI 编程必看
      - "program synthesis"
      
      # AI Agent 相关
      - "LLM agents"
      - "autonomous agents"
      - "tool-use"
      - "function calling"
      - "ReAct"  # 经典的推理-行动架构
      - "multi-agent systems"
      
      # 具体产品/技术（可选，用于跟踪最新动态）
      - "Claude Code"
      - "agentic workflow"
      - "coding assistant"
      
    arxiv_categories:
      - "cs.SE"  # Software Engineering（软件工程）：AI 编程、自动化修复代码的最核心分类
      - "cs.CL"  # Computation and Language（计算与语言）：LLM 的理解与生成能力
      - "cs.AI"  # Artificial Intelligence（人工智能）：Agent 的规划、决策、逻辑推理
      - "cs.LG"  # Machine Learning（机器学习）：底层模型微调与架构
      - "cs.PL"  # Programming Languages（编程语言）：涉及代码形式化验证、静态分析与 AI 的结合
      - "cs.HC"  # Human-Computer Interaction（人机交互）：研究开发者如何与 AI Coding 工具协作
    priority: 8
    
  "自动驾驶":
    keywords:
      - "E2E"
      - "VLA"
      - "VLM"
      - "World Model"
      - "planning"
      - "autonomous driving"
      - "embodied AI"
    arxiv_categories:
      - "cs.RO"  # Robotics（机器人学）：自动驾驶和规划的最核心分类
      - "cs.CV"  # Computer Vision（计算机视觉）：VLM、VLA 和感知层的核心
      - "cs.LG"  # Machine Learning（机器学习）：世界模型、端到端训练算法
      - "cs.AI"  # Artificial Intelligence（人工智能）：通用的 AI 决策与推理
      - "cs.CL"  # Computation and Language（计算与语言）：涉及 VLM/VLA 中的语言理解部分
    priority: 8

# 排除的关键词（可选）
excluded_keywords:
  - "3D"
  - "review"
  - "workshop"
  - "survey"

# 自定义通用词过滤列表（可选）
# 这些词在自动关键词链接时会被跳过，不会被替换为 wikilink
# 默认已包含常见英语功能词和通用 ML 术语，此处可添加额外的过滤词
# extra_common_words:
#   - "dataset"
#   - "results"
#   - "performance"
